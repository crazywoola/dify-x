<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Agent Systems SG</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/theme/black.css" id="theme">

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000;
    }

    .reveal,
    .reveal .slides {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #000;
    }

    .reveal .slides section {
      padding: 0;
      background: transparent !important;
    }

    .reveal .backgrounds,
    .reveal .slide-background,
    .reveal .slide-background-content {
      background-color: transparent !important;
    }

    .reveal .slide-background-content {
      background-size: cover !important;
      background-position: center center !important;
      background-repeat: no-repeat !important;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides" id="slides"></div>
  </div>

  <script>
    const slideData = [
      {
        title: "The Path to Production",
        image: "./assets/assets/1.png",
        notes: [
          "Timing:",
          "- Aim for about 1 minute 15 seconds here.",
          "- This deck is paced for roughly 27 minutes in total, so start measured and unhurried.",
          "Say:",
          '- "I want to open with the main idea of this session: production AI is not just about making a model answer correctly. It is about making the whole system smart enough to know when to pause, when to ask, and how to continue with human judgment built in."',
          '- "That is a very different goal from building a demo. A demo wants a wow moment. A production system wants repeatability, traceability, and calm behavior under pressure."',
          '- "So as you look at this opening image, treat it as the thesis for everything that follows. We are not talking about replacing people with automation. We are talking about designing workflows where automation and human judgment reinforce each other."',
          "Focus:",
          "- Keep the energy calm and confident instead of hype-driven.",
          "- Let the audience settle in before moving forward.",
          "Bridge:",
          '- "With that framing in place, let us look at why capability alone still does not make a system production ready."'
        ].join("\n")
      },
      {
        title: "Agent Can Act, But Production Is Not Ready",
        image: "./assets/assets/2.png",
        notes: [
          "Timing:",
          "- Aim for about 1 minute 30 seconds here.",
          "Say:",
          '- "This slide names the gap very directly. Agents can act, but production is still not ready."',
          '- "In practice, teams usually hit three blockers. The first is trust erosion. If a model gives a bad answer or triggers the wrong action in front of a customer, the damage is immediate and memorable."',
          '- "The second is governance. In finance, healthcare, government, and most enterprise settings, you cannot just say the model seemed right. You need records, ownership, approval history, and a trail that someone can inspect later."',

          "Focus:",
          "- Gesture left to right across the three failure modes.",
          "- Make this feel familiar to builders who have already shipped LLM features.",
          "Bridge:",
          '- "Once we see the real blockers clearly, we can talk about the design patterns that close that gap."'
        ].join("\n")
      },
      {
        title: "Three Themes of the Session",
        image: "./assets/assets/3.png",
        notes: [
          "Timing:",
          "- Aim for about 1 minute here.",
          "Say:",
          '- "This slide gives the structure for the rest of the talk."',
          '- "First, we will talk about Human-in-the-Loop, because mature systems need explicit checkpoints. Second, we will talk about collaboration, because production agents are operated by teams, not isolated prompt authors. Third, we will talk about templates and distribution, because the best workflows need to be reusable, discoverable, and easy to adopt."',
          '- "If you keep these three themes in mind, the deck becomes simple: how do we make agent behavior governable, operable, and repeatable?"',

          "- Keep this as a roadmap, not a deep explanation slide.",
          "- Move with momentum into the first section.",
          "Bridge:",
          '- "Let us start with the most important foundation: Human-in-the-Loop."'

      {

        image: "./assets/assets/4.png",
        notes: [
          "Timing:",
          "- Aim for about 45 seconds here.",
          "Say:",
          '- "When I say Human-in-the-Loop, I do not mean sending a Slack message after the workflow breaks. I mean making human judgment a first-class part of the workflow graph itself."',
          '- "That sounds like a small wording change, but it is actually a big architectural shift. Once the handoff is explicit, it becomes visible, auditable, and designable."',
          "Focus:",
          "- Treat this as a section marker and reset the room.",
          "- Slow down slightly before going into the mechanics.",
          "Bridge:",
          '- "So the next question is: why exactly do production systems need this built in?"'

          "Timing:",
          "- Aim for about 1 minute 30 seconds here.",
          "Say:",
          '- "This is where the mindset changes from capability to responsibility."',
          '- "A production system usually needs four things. It needs review, because sensitive output should not always go out untouched. It needs accountability, because someone must own the final decision. It needs escalation, because some edge cases should move to the right expert instead of forcing the model to guess. And it needs fallback logic, because silence and failure are both possible states in real operations."',
          '- "Notice how different that sounds from a benchmark discussion. The real question is not just can the AI complete the task. The real question is should the AI complete the task by itself, under these conditions, with this level of risk."',
          '- "That is why Human-in-the-Loop is not a concession. It is the correct answer to risk-sensitive workflow design."',
          "Focus:",
          "- Emphasize accountability and fallback as especially important in enterprise settings.",
          "- Let the phrase should it do it by itself land clearly.",
          "Bridge:",
          '- "Once we accept that principle, we can design collaboration into the workflow instead of bolting it on later."'
        ].join("\n")
      },
      {
        title: "Designing for Collaboration",
        image: "./assets/assets/6.png",
        notes: [
          "Timing:",
          "- Aim for about 1 minute 15 seconds here.",
          "Say:",
          '- "This slide makes a very practical point: production-grade systems are not fully autonomous. They are designed for collaboration."',
          '- "The important phrase here is workflow primitive. Human input is not an exception path. It is not a weird patch around the real workflow. It is one of the native building blocks of the system."',
          '- "That matters because once something is a native building block, you can reason about it clearly. You can version it, measure it, route it, and resume from it."',
          '- "In other words, the handoff is no longer hidden in tribal knowledge. It becomes part of the system design."',
          "Focus:",
          "- Briefly call out structured collaboration and resumable flow.",
          "- Keep the explanation simple and concrete.",
          "Bridge:",
          '- "The next slide shows exactly what that handoff looks like in motion."'
        ].join("\n")
      },
      {
        title: "Human Judgment as a Workflow Primitive",
        image: "./assets/assets/7.png",
        notes: [
          "Timing:",
          "- Aim for about 1 minute 30 seconds here.",
          "Say:",
          '- "Here is the basic life cycle. Execution reaches a Human Input node and pauses. A request is sent to the designated person. That person reviews the available context, provides input or a decision, and the workflow resumes on the appropriate branch."',
          '- "That may sound simple, but it solves several hard problems at once. It clarifies who is responsible, it captures the exact moment of decision, and it lets the workflow continue with preserved context instead of forcing a restart."',
          '- "This is also much better than an informal review process, because the workflow itself knows it is waiting and knows what data needs to come back."',
          '- "So instead of human review being outside the system, human review becomes part of the runtime behavior."',
          "Focus:",
          "- Walk top to bottom so the audience can follow the sequence.",
          "- Stress that resume happens with context still attached.",
          "Bridge:",
          '- "Once we have that primitive, we can build a richer interaction model on top of it."'
        ].join("\n")
      },
      {
        title: "A Complete Interaction Model",
        image: "./assets/assets/8.png",
        notes: [
          "Timing:",
          "- Aim for about 1 minute 30 seconds here.",
          "Say:",
          '- "One of the mistakes people make is assuming Human-in-the-Loop means a binary approve or reject button. Real operations are more nuanced than that."',
          '- "Sometimes the reviewer wants to edit the draft directly. Sometimes they want to leave feedback and ask for revision. Sometimes they want regeneration from the model, or to forward the task to a different person. Sometimes the real issue is not the content but the lack of response, which means the workflow needs wait times, reminders, retries, or escalation."',
          '- "That is why this slide matters. It shows that collaboration is not a single event. It is a designed interaction model that includes uncertainty handling."',
          '- "If you support these richer states, the system feels far more natural to operators, because it behaves the way real teams behave."',
          "Focus:",
          "- Mention fallback branches and first-response resolution explicitly.",
          "- Make this feel operational rather than theoretical.",
          "Bridge:",
          '- "With that complete interaction model in mind, we can describe what mature agent design looks like more generally."'
        ].join("\n")
      },
      {
        title: "Future of Agent Design",
        image: "./assets/assets/9.png",
        notes: [
          "Timing:",
          "- Aim for about 1 minute 30 seconds here.",
          "Say:",
          '- "This slide is one of my favorites because it reframes maturity very clearly. The direction is from autonomous agents toward collaborative, feedback-rich systems."',
          '- "The five pillars are a useful checklist. Pause at the right time. Surface the right context. Ask the right person. Capture the right feedback. Then use that feedback to improve future behavior."',
          '- "That is a much more realistic target than total autonomy. In production, good systems are not the ones that never ask for help. Good systems are the ones that know when asking for help is the correct action."',
          '- "So Human Input is not a workaround for automation. It is what mature automation looks like."',
          "Focus:",
          "- Let the autonomous versus collaborative contrast land.",
          "- This is a strong conceptual slide, so pause briefly after the final sentence.",
          "Bridge:",
          '- "Now let us make this concrete with a couple of real workflow examples."'
        ].join("\n")
      },
      {
        title: "Financial Services Example",
        image: "./assets/assets/10.png",
        notes: [
          "Timing:",
          "- Aim for about 1 minute 30 seconds here.",
          "Say:",
          '- "This example shows a very common enterprise pattern. Report generation is automated, but the final output still needs expert review before it reaches the client."',
          '- "What is useful here is the placement. The system does not ask for review too early, when there is nothing meaningful to inspect. It asks after synthesis and before send, which is exactly where the output becomes sensitive."',
          '- "That means automation still removes the bulk of the manual workload, while human judgment is reserved for the point of highest consequence."',
          '- "This is a good way to think about Human-in-the-Loop in general. Put people where judgment matters most, not where the machine can already perform reliably."',
          "Focus:",
          "- Mention scale and consistency if the room is enterprise-heavy.",
          "- Emphasize that reviewers see exactly what the client would receive.",
          "Bridge:",
          '- "The same design principle works outside finance as well, even when the issue is missing context rather than final approval."'
        ].join("\n")
      },
      {
        title: "Global Support Example",
        image: "./assets/assets/11.png",
        notes: [
          "Timing:",
          "- Aim for about 1 minute 30 seconds here.",
          "Say:",
          '- "This support scenario is helpful because it shows a different use of Human-in-the-Loop. Here the workflow is not asking for approval. It is asking for the missing information required to make the next routing decision correctly."',
          '- "That is a subtle but important distinction. Human input is not only about risk control. It is also about context completion."',
          '- "If the system does not know the office location, policy region, or account type, pushing forward with a guess is often the wrong move. A short structured pause is better than a confident mistake."',
          '- "This is why the outcome feels like collaborative intelligence. The machine handles speed and structure, and the human supplies the missing context that keeps the workflow accurate."',
          "Focus:",
          "- Use the reimbursement example as the concrete anchor.",
          "- Keep the phrase context completion in mind.",
          "Bridge:",
          '- "Once workflows can pause, ask, and resume well, the next question is how we measure whether they are actually improving."'
        ].join("\n")
      },
      {
        title: "Evaluation",
        image: "./assets/assets/12.png",
        notes: [
          "Timing:",
          "- Aim for about 45 seconds here.",
          "Say:",
          '- "The next section is about evaluation, because mature agent systems need more than orchestration. They also need measurement."',
          '- "If Human-in-the-Loop gives us control, evaluation gives us feedback on quality."',
          "Focus:",
          "- Keep this short as a section break.",
          "- Reset the audience from workflow behavior to system measurement.",
          "Bridge:",
          '- "So first, why does evaluation matter so much in this space?"'
        ].join("\n")
      },
      {
        title: "Why Use Evaluation",
        image: "./assets/assets/13.png",
        notes: [
          "Timing:",
          "- Aim for about 1 minute 30 seconds here.",
          "Say:",
          '- "Evaluation matters because without it, most agent iteration is guesswork."',
          '- "Retrieval can be unstable. Prompt changes can have unclear effects. Model upgrades can help one scenario while hurting another. And manual testing is slow, subjective, and expensive."',
          '- "A proper evaluation layer changes that. It lets teams test proactively before deployment, compare options more quickly, and replace vague confidence with measurable trust."',
          '- "That phrase measurable trust is important. In enterprise environments, trust does not come from enthusiasm. It comes from evidence that the system behaves well across a meaningful set of scenarios."',
          "Focus:",
          "- Contrast the left side as pain and the right side as capability.",
          "- Make the case that evaluation is what speeds teams up safely.",
          "Bridge:",
          '- "With that in mind, let us look at what an end-to-end evaluation framework actually needs to cover."'
        ].join("\n")
      },
      {
        title: "End-to-End Evaluation Framework",
        image: "./assets/assets/14.png",
        notes: [
          "Timing:",
          "- Aim for about 1 minute 45 seconds here.",
          "Say:",
          '- "This framework breaks the problem into four checks. First, answer relevance: does the response actually address the question asked? Second, retrieval relevance: did we bring back the right supporting context? Third, groundedness: is the answer supported by the documents rather than invented? Fourth, correctness: does the answer align with known truth or an accepted reference."',
          '- "I like this framing because it helps teams debug with precision. If answer relevance is weak, the issue may be task understanding. If retrieval relevance is weak, the issue may be indexing or ranking. If groundedness is weak, you may have hallucination problems. If correctness is weak even with good retrieval, your synthesis logic may still be off."',
          '- "That means evaluation is not just a scorecard. It is a diagnostic tool for deciding what to improve next."',
          '- "And once teams save trusted configurations and snapshots, iteration becomes much more disciplined."',
          "Focus:",
          "- Walk through the four metrics slowly and clearly.",
          "- This is one of the denser slides, so let it breathe.",
          "Bridge:",
          '- "So evaluation gives us a quality loop. The next section shows how collaboration gives us an operating loop."'
        ].join("\n")
      },
      {
        title: "Collaboration",
        image: "./assets/assets/15.png",
        notes: [
          "Timing:",
          "- Aim for about 45 seconds here.",
          "Say:",
          '- "Now we move from workflow correctness to team operation."',
          '- "Because even a well-designed agent is hard to scale if only one person understands how it works or if every change depends on private prompt fragments and screenshots."',
          "Focus:",
          "- Use this as a clean reset into the collaboration theme.",
          "Bridge:",
          '- "Let us look at what collaboration means when it is designed directly into the product."'
        ].join("\n")
      },
      {
        title: "Collaborative Workflow",
        image: "./assets/assets/16.png",
        notes: [
          "Timing:",
          "- Aim for about 1 minute 30 seconds here.",
          "Say:",
          '- "This slide shows the operating reality of a shared agent system. Different people can draft, review, and publish without stepping on each other."',
          '- "That matters because most production workflows are team artifacts. They are not static prompts. They evolve over time, they need review, and they need safe ways to compare versions and roll back when necessary."',
          '- "I would call out three things here. First, role-based access, which creates clarity about who can change what. Second, version history, which turns workflow changes into inspectable events. Third, a draft-to-review-to-publish lifecycle, which gives the team a process instead of a pile of ad hoc edits."',
          '- "The shared SOP library is also important because it turns private know-how into reusable operational knowledge."',
          "Focus:",
          "- Call out draft, review, publish explicitly.",
          "- Mention rollback as a confidence feature, not just a technical feature.",
          "Bridge:",
          '- "Once workflows are collaborative inside a team, the next step is to make them reusable across teams."'
        ].join("\n")
      },
      {
        title: "Marketplace and Template",
        image: "./assets/assets/17.png",
        notes: [
          "Timing:",
          "- Aim for about 45 seconds here.",
          "Say:",
          '- "The final section is about distribution and reuse."',
          '- "If a workflow pattern works well, the value increases dramatically when others can discover it, adopt it quickly, and adapt it with less effort."',
          "Focus:",
          "- Keep this short and transitional.",
          "Bridge:",
          '- "That is exactly the role of templates and the marketplace."'
        ].join("\n")
      },
      {
        title: "Creator Center and Template Marketplace",

          "- Aim for about 1 minute 30 seconds here.",

          '- "This slide shows how workflows move from internal assets to reusable products."',
          '- "Creators can publish templates, and users can browse, evaluate, and adopt them much more quickly than rebuilding from zero."',
          '- "What I like here is that there is also structure around quality. Metadata, setup steps, naming, and submission guidance help keep the marketplace searchable and understandable."',
          '- "That is important because reuse only works when people can trust what they are adopting. A marketplace without quality signals turns into noise very quickly."',
          '- "So the user value is speed, but the platform value is consistency."',
          "Focus:",
          "- Mention one-click adoption and creator submission flow.",
          "- Frame this as operational reuse, not just content reuse.",
          "Bridge:",
          '- "And of course, a healthy marketplace depends on an active and credible community around it."'
        ].join("\n")
      },
      {
        title: "Community-Driven and Globally Recognized",
        image: "./assets/assets/19.png",
        notes: [
          "Timing:",
          "- Aim for about 1 minute 15 seconds here.",
          "Say:",
          '- "This slide is really the ecosystem proof point."',
          '- "Strong open-source momentum matters because it creates more contributors, more real-world feedback, and faster evolution of best practices."',
          '- "It also means the platform is not learning from a narrow set of internal use cases. It is being stressed and refined by a broader community with different industries, different deployment patterns, and different operational expectations."',
          '- "That makes the patterns we discussed today more credible, because they are being validated in the open."',
          "Focus:",
          "- Keep this energetic but do not linger too long.",
          "- Treat it as evidence of momentum and maturity.",
          "Bridge:",
          '- "That momentum is also reflected in the organizations using the platform."'

      },
      {
        title: "Trusted by Leaders Worldwide",

        notes: [
          "Timing:",
          "- Aim for about 1 minute here.",
          "Say:",
          '- "I would use this slide as fast social proof rather than reading logos one by one."',
          '- "The key message is that the demand pattern is consistent across industries. Teams want the power of agents, but they also need governance, collaboration, and production controls."',

          "- Pause here and invite questions.",
          "- End with a clear invitation rather than an abrupt stop.",

  </script>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/plugin/notes/notes.js"></script>
  <script src="./scripts/format-speaker-notes.js"></script>
  <script>
    const slidesRoot = document.getElementById("slides");

    for (const slide of slideData) {
      const section = document.createElement("section");
      section.setAttribute("data-background-image", slide.image);
      section.setAttribute("data-background-size", "cover");
      section.setAttribute("data-background-position", "center center");
      section.setAttribute("data-background-repeat", "no-repeat");

      const heading = document.createElement("h2");
      heading.className = "visually-hidden";
      heading.textContent = slide.title;
      section.appendChild(heading);

      const notes = document.createElement("aside");
      notes.className = "notes";
      notes.textContent = slide.notes;
      section.appendChild(notes);

      slidesRoot.appendChild(section);
    }

    SpeakerNotesFormatter.enhance();

    Reveal.initialize({
      width: 1920,
      height: 1080,
      margin: 0,
      hash: true,
      controls: false,
      progress: false,
      slideNumber: false,
      transition: "none",
      backgroundTransition: "none",
      center: false,
      overview: false,
      plugins: [ RevealNotes ]
    });

    Reveal.on("ready", function () {
      SpeakerNotesFormatter.enhance();
    });

    Reveal.on("slidechanged", function () {
      SpeakerNotesFormatter.enhance();
    });
  </script>
</body>
</html>
